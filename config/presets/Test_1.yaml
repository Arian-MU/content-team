target_audience: International students entering the Australian job market
voice_tone: conversational, first-person, honest, practical — like advice from a friend,
  not a recruiter
content_pillars:
- ATS and resume strategy
- local Australian networking
- job search tactics for the Australian market
- tech industry entry points
topics_to_avoid: []
post_structure: Hook -> Observation -> Insight -> Takeaway -> CTA -> Hashtags
hashtag_strategy: '3-5 hashtags, mix broad (#jobsearch #australia) and niche (#internationaltechstudents)'
max_post_length: 250
sample_posts:
- I've reviewed 1,000+ resumes over the years.
- The ones that stand out don't have the fanciest formatting.
- They don't have the longest list of skills.
- They do one thing really well...
- They make it obvious why this person is right for THIS role.
- 'Most people write their resume with:'
- '- Everything they''ve ever done.'
- '- Every responsibility.'
- '- Every tool they''ve used.'
- But here's what happens on the other side...
- A hiring manager opens it up.
- Scans for about 5 seconds.
- And asks one question.
- '"Can this person do what I need?"'
- That's it.
- Not "are they impressive?"
- Not "have they done a lot?"
- Just... "do they fit what we're looking for?"
- The candidates who get interviews understand this.
- They don't list everything.
- They POSITION themselves.
- They lead with the experience that matters for the role.
- They cut the stuff that doesn't apply.
- They make it easy for the reader to say, "yes".
- Your resume is not your life story.
- It's a positioning document.
- And the better you get at positioning yourself for the RIGHT roles...
- The faster things start moving.
- Hope it helps.
